services:
  ticket-service:
    image: ghcr.io/ansimran/microservice-create-tickets-in-zohodesk:latest
    build:
      context: .
      args:
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        VERSION: "${VERSION:-0.1.0}"
    container_name: ticket-service
    env_file: .env
    environment:
      ZOHO_TOKEN_SERVICE_URL: http://token-service:8000/v1/token
    ports:
      - "127.0.0.1:8200:8100"
    networks:
      - zoho-token-service_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  zoho-token-service_default:
    external: true
